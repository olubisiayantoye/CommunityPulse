# render.yaml - One-click deploy with full CRUD + landing page
services:
  # Backend API
  - type: web
    name: community-pulse-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: community-pulse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: HF_API_TOKEN
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: community-pulse-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend (with beautiful landing page)
  - type: web
    name: community-pulse-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: community-pulse-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # PostgreSQL Database
  - type: pserv
    name: community-pulse-db
    plan: free
    database: postgres
    ipAllowList: []

  # Migration Worker (runs once after DB is ready)
  - type: worker
    name: community-pulse-migrations
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/migrate.js
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: community-pulse-db
          property: connectionString
    dependsOn:
      - name: community-pulse-db
        condition: ready