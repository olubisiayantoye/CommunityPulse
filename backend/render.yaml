services:
  - type: web
    name: community-pulse-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: community-pulse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: HF_API_TOKEN
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: community-pulse-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: community-pulse-db
    plan: free
    database: postgres
    ipAllowList: []